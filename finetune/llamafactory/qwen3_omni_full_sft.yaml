### model
model_name_or_path: Qwen/Qwen3-Omni-30B-A3B-Instruct
video_max_pixels: 65536
video_fps: 1.0
video_maxlen: 150
use_audio_in_video: true
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: OmniVideo-100K
dataset_dir: OmniVideo-100K
template: qwen3_omni_nothink
# default_system: You are Qwen, a virtual human developed by the Qwen Team, Alibaba Group, capable of perceiving auditory and visual inputs, as well as generating text and speech.
cutoff_len: 65536
# max_samples: 100
overwrite_cache: true
tokenized_path: 
preprocessing_batch_size: 1000
preprocessing_num_workers: 64
dataloader_num_workers: 4

### output
output_dir: 
logging_steps: 25
save_steps: 250
plot_loss: true
overwrite_output_dir: true
save_only_model: false
save_total_limit: 8
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
# resume_from_checkpoint: true
flash_attn: fa2
